<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CardioSense Fixed</title>
</head>
<body>

<h2>CardioSense Test UI</h2>

<input id="age" placeholder="Age"><br>
<input id="gender" placeholder="Gender"><br>
<input id="height" placeholder="Height"><br>
<input id="weight" placeholder="Weight"><br>
<input id="ap_hi" placeholder="Systolic BP"><br>
<input id="ap_lo" placeholder="Diastolic BP"><br>
<input id="cholesterol" placeholder="Cholesterol"><br>
<input id="gluc" placeholder="Glucose"><br>
<input id="smoke" placeholder="Smoke"><br>
<input id="alco" placeholder="Alcohol"><br>
<input id="active" placeholder="Active"><br><br>

<button onclick="runAnalysis()">Predict</button>

<p id="result"></p>

<script>
const API_URL = 'https://cardiosense-backend.onrender.com/predict';

async function runAnalysis() {
    const vals = {
        age: parseFloat(document.getElementById('age').value),
        gender: parseFloat(document.getElementById('gender').value),
        height: parseFloat(document.getElementById('height').value),
        weight: parseFloat(document.getElementById('weight').value),
        ap_hi: parseFloat(document.getElementById('ap_hi').value),
        ap_lo: parseFloat(document.getElementById('ap_lo').value),
        cholesterol: parseFloat(document.getElementById('cholesterol').value),
        gluc: parseFloat(document.getElementById('gluc').value),
        smoke: parseFloat(document.getElementById('smoke').value),
        alco: parseFloat(document.getElementById('alco').value),
        active: parseFloat(document.getElementById('active').value)
    };

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(vals)
        });

        const data = await res.json();

        document.getElementById("result").innerText =
            `Prediction: ${data.prediction}, Probability: ${data.probability}, Risk: ${data.risk}`;
    } catch (err) {
        document.getElementById("result").innerText = "Error connecting to backend";
    }
}
</script>

</body>
</html>
