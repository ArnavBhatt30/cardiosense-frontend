<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CardioSense</title>
</head>
<body>

<h2>CardioSense Test UI</h2>

<input id="age" placeholder="Age"><br><br>
<input id="gender" placeholder="Gender (1/2)"><br><br>
<input id="height" placeholder="Height"><br><br>
<input id="weight" placeholder="Weight"><br><br>
<input id="ap_hi" placeholder="Systolic BP"><br><br>
<input id="ap_lo" placeholder="Diastolic BP"><br><br>
<input id="cholesterol" placeholder="Cholesterol"><br><br>
<input id="gluc" placeholder="Glucose"><br><br>
<input id="smoke" placeholder="Smoke (0/1)"><br><br>
<input id="alco" placeholder="Alcohol (0/1)"><br><br>
<input id="active" placeholder="Active (0/1)"><br><br>

<button onclick="runAnalysis()">Predict</button>

<h3 id="output"></h3>

<script>
async function runAnalysis() {

    const vals = {
        age: parseFloat(document.getElementById('age').value),
        gender: parseFloat(document.getElementById('gender').value),
        height: parseFloat(document.getElementById('height').value),
        weight: parseFloat(document.getElementById('weight').value),
        ap_hi: parseFloat(document.getElementById('ap_hi').value),
        ap_lo: parseFloat(document.getElementById('ap_lo').value),
        cholesterol: parseFloat(document.getElementById('cholesterol').value),
        gluc: parseFloat(document.getElementById('gluc').value),
        smoke: parseFloat(document.getElementById('smoke').value),
        alco: parseFloat(document.getElementById('alco').value),
        active: parseFloat(document.getElementById('active').value)
    };

    try {
        const res = await fetch("https://cardiosense-backend.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(vals)
        });

        const data = await res.json();

        console.log("FULL RESPONSE:", data);

        if (data.error) {
            document.getElementById("output").innerText =
                "Backend Error: " + data.error;
            return;
        }

        document.getElementById("output").innerText =
            "Prediction: " + data.prediction +
            " | Probability: " + data.probability +
            " | Risk: " + data.risk;

    } catch (err) {
        console.log(err);
        document.getElementById("output").innerText =
            "Error connecting to backend";
    }
}
</script>

</body>
</html>
